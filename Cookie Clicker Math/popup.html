<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 430px;
      padding: 14px;
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #181818;
      color: #f3f3f3;
    }

    h3 {
      margin: 0 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
      color: #e2b24a;
      text-align: center;
      font-size: 17px;
    }

    .view-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .view-tab {
      min-height: 32px;
      border: 1px solid #3f3f3f;
      border-radius: 5px;
      background: #222;
      color: #cfcfcf;
      padding: 7px;
      font-size: 12px;
      font-weight: 700;
    }

    .view-tab.active {
      border-color: #e2b24a;
      background: #2b2518;
      color: #f4d889;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .mode-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-option {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 36px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #252525;
      color: #d8d8d8;
      font-size: 13px;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 11px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      color: #c9c9c9;
      font-size: 12px;
    }

    input,
    select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #454545;
      border-radius: 5px;
      background: #242424;
      color: #fff;
      padding: 8px;
      font-size: 13px;
    }

    .goal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }

    .settings-toggle {
      margin-bottom: 11px;
      border: 1px solid #3f3f3f;
      background: #222;
      color: #d7d7d7;
      text-align: left;
    }

    .settings-toggle::after {
      content: "+";
      float: right;
    }

    .settings-toggle[aria-expanded="true"]::after {
      content: "-";
    }

    .optional-actions-panel {
      margin-bottom: 11px;
    }

    .check-option {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 6px 8px;
      border: 1px solid #3f3f3f;
      border-radius: 5px;
      background: #222;
      color: #d7d7d7;
      font-size: 12px;
      line-height: 1.2;
    }

    .check-option input {
      width: auto;
      margin: 0;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 5px;
      background: #e2b24a;
      color: #171717;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    #output-container {
      margin-top: 14px;
      border: 1px solid #333;
      border-radius: 5px;
      background: #101010;
      padding: 10px;
      max-height: 270px;
      overflow-y: auto;
    }

    #math-output-container {
      border: 1px solid #333;
      border-radius: 5px;
      background: #101010;
      padding: 10px;
      max-height: 520px;
      overflow-y: auto;
    }

    #output,
    #mathOutput {
      white-space: pre-wrap;
      color: #dedede;
      font-size: 12.5px;
      line-height: 1.45;
    }

    #mathOutput {
      font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
      font-size: 11.5px;
      line-height: 1.38;
    }

    .status {
      color: #969696;
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>Cookie Math Commander</h3>

  <div class="view-tabs">
    <button id="controlsTab" class="view-tab active" type="button">Controls</button>
    <button id="mathTab" class="view-tab" type="button">Math Editor</button>
  </div>

  <div id="controlsPanel" class="tab-panel active">
    <div class="mode-selector">
      <label class="mode-option">
        <input type="radio" name="mode" value="advice" checked>
        Advice Mode
      </label>
      <label class="mode-option">
        <input type="radio" name="mode" value="commander">
        Commander Mode
      </label>
    </div>

    <div class="goal-grid">
      <div class="form-group">
        <label for="timeGoal">Most cookies after</label>
        <input id="timeGoal" type="text" placeholder="10m, 1h 30m, 2d">
      </div>
      <div class="form-group">
        <label for="targetGoal">Reach cookies</label>
        <input id="targetGoal" type="text" placeholder="1 trillion, 1e12">
      </div>
    </div>

    <div class="form-group">
      <label for="strategy">Math profile</label>
      <select id="strategy">
        <option value="balanced">Balanced deterministic</option>
        <option value="short">Short-term payoff</option>
        <option value="long">Long-term growth</option>
      </select>
    </div>

    <button id="optionsToggle" class="settings-toggle" type="button" aria-expanded="false" aria-controls="optionalActions">
      Action permissions
    </button>

    <div id="optionalActions" class="optional-actions-panel" hidden>
      <div class="option-grid">
        <label class="check-option">
          <input id="allowAchievementActions" type="checkbox" checked>
          Milk achievements
        </label>
        <label class="check-option">
          <input id="allowWrinklers" type="checkbox" checked>
          Pop wrinklers
        </label>
        <label class="check-option">
          <input id="allowSugarLumpCollect" type="checkbox" checked>
          Collect lumps
        </label>
        <label class="check-option">
          <input id="allowSugarLumpSpend" type="checkbox" checked>
          Spend lumps
        </label>
        <label class="check-option">
          <input id="allowAscension" type="checkbox" checked>
          Ascend
        </label>
        <label class="check-option">
          <input id="allowAscensionUpgrades" type="checkbox" checked>
          Ascension upgrades
        </label>
      </div>
    </div>

    <button id="run">Run Math Strategy</button>

    <div id="output-container">
      <div id="output" class="status">Open Cookie Clicker, choose one goal type, or leave both blank for a 10m default.</div>
    </div>
  </div>

  <div id="mathPanel" class="tab-panel">
    <div id="math-output-container">
      <div id="mathOutput" class="status">Run Advice Mode or Commander Mode to see planner math.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
